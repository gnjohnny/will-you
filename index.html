<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Will You?</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <h1 class="question" id="question">Will you send me Ksh 100 ?😭</h1>
        <div class="sticker">
          <img
            src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3bDliNTl0MjQ1YzVwNjQwYnN4czJ3Zm96bWNxc2I3bDgybzQ5anJnYyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/XYEEvoX0Ub69ZgN9ai/giphy.gif"
            alt=""
            width="200"
            height="200"
            class="sticker_img"
            id="sticker_img"
          />
        </div>
        <div class="controls" id="controls">
          <button class="yes_btn" id="yes_btn">Yes</button>
          <button class="no_btn" id="no_btn">No</button>
        </div>
        <div class="message" id="message"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
